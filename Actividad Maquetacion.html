<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
  
    .conter{display: grid;
    background-color: greenyellow;
   grid-template-columns: auto auto auto ;
   padding: 5px;
   gap: 5px;}
   .conter > div{background-color: white;
   text-align: center;
   font-size: 5px;
   border: 1px black solid;}
   .conter2{display: grid;
    background-color: greenyellow;
   grid-template-columns: auto auto ;
   padding: 5px;
   gap: 5px;
justify-content: center 20px;}
   
   .conter2 > div{background-color: white;
   text-align: center;
   font-size: 5px;
   border: 1px black solid;
align-items: center;}
   .conter3{display: grid;
    background-color:greenyellow;
   grid-template-columns: auto auto auto auto;
   padding: 5px;
   gap: 5px;}
   
   .conter3 > div{background-color: white;
   text-align: center;
   font-size: 5px;
   border: 1px black solid;}
.conter4{display: grid;
    background-color: greenyellow;
   grid-template-columns: auto ;
   padding:5px;
   gap: 5px;}
   .conter4> div{background-color: white;
   text-align: center;
   font-size: 15px;
   border: 1px black solid; }
.item1{background-color: white;
   text-align: center;
   font-size: 15px;
   border: 1px black solid;
   height: 100px; }
   .conter5{background-color: white;
   text-align: center;
   font-size: 15px;
   border: 1px black solid;}
   .conter6{display: grid;
    background-color: greenyellow;
   grid-template-columns: auto auto auto ;
   padding: 5px;
   gap: 5px;}
   .conter6 > div{background-color: white;
   text-align: center;
   font-size: 5px;
   border: 1px black solid;
grid-template-columns: 2fr 1fr 1fr;}

</style>
<center>
<h1>Actividad Maquetacion</h1>
</center>
<body>
<div class="conter">
    <div>A</div>
    <div>B</div>
    <div>C</div>
</div>
<div class="conter2">
     <div>1</div> 
     <div>2</div>
     <div>3</div>
     <div>4</div>
</div>
<div class="conter3">
    <div>Noticia 1</div>
    <div>Noticia 2</div>
    <div>Noticia 3</div>
    <div>Noticia 4</div>
    <div>Noticia 5</div>
    <div>Noticia 6</div>
    <div>Noticia 7</div>
    <div>Noticia 8</div>
</div>
<div class="conter4">
    <div>Encabezado</div>
    <div class="item1">Contenido principal</div>
</div>
<div class="conter5">
    <div>Pie de pagina</div>
</div>
<br><hr>
<div class="conter6">
   <div >Pincipal</div>
   <div>Secundario</div>
   <div>Terciario</div>
</div>
    
</body>
</html>
