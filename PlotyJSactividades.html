<!DOCTYPE html>
<html lang="sp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DActividades Ploty JS</title>
    <script src="https://cdn.plot.ly/plotly-3.6.0.min.js" charset="utf-8"></script>
</head>
<body>
    <br>
         <div id="Ventas" style="width:600px;height:400px;"></div>
         <hr>
    <script>
    var xMeses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio' ];

var yIngresos = [20, 14,68, 85, 130, 200];

var trace1 = {
  x: xMeses,
  y: yIngresos,
  type: 'bar',
  text: yIngresos.map(String),
  textposition: 'auto',
  hoverinfo: 'none',
  marker: {
    color: 'rgb(127,255,212)',
    opacity: 0.6,
    line: {
      color: 'rgb(0,0,0)',
      width: 1.5
    }
  }
};

var data = [trace1];

var layout = {
  title: {
    text: 'Ventas Mensuales'
  },
  barmode: 'stack'
};

Plotly.newPlot('Ventas', data, layout);
</script>

<br>
