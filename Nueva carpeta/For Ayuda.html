<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ejemplos</title>
</head>
<body>
    <script>
// FOR BÁSICO

for(let i = 1; i <= 10; i++){
    console.log(i);
}


// RECORRER UN ARRAY

let frutas = ["Manzana","Pera","Banana"];

for(let i = 0; i < frutas.length; i++){
    console.log(frutas[i]);
}


// MOSTRAR POSICIÓN Y VALOR

let nombres = ["Juan","Ana","Pedro"];

for(let i = 0; i < nombres.length; i++){
    console.log("Posición: " + i);
    console.log("Nombre: " + nombres[i]);
}


// SUMAR VALORES

let numeros = [1,2,3,4,5];
let suma = 0;

for(let i = 0; i < numeros.length; i++){
    suma = suma + numeros[i];
}

console.log(suma);


// FOR CON IF

let edades = [15,18,20,12];

for(let i = 0; i < edades.length; i++){

    if(edades[i] >= 18){
        console.log("Mayor de edad: " + edades[i]);
    }

}


// TABLA DE MULTIPLICAR

let numero = 5;

for(let i = 1; i <= 10; i++){

    console.log(numero + " x " + i + " = " + numero*i);

}


// ARRAY DE OBJETOS

let productos = [
    {
        nombre:"Remera",
        precio:5000
    },
    {
        nombre:"Pantalón",
        precio:8000
    }
];


for(let i = 0; i < productos.length; i++){

    console.log(productos[i].nombre);
    console.log(productos[i].precio);

}


// RECORRER OBJETO

let persona = {
    nombre:"Juan",
    edad:17,
    ciudad:"Resistencia"
};


for(let dato in persona){

    console.log(dato + ": " + persona[dato]);

}


// FOR CON JSON

let alumnos = [
    {
        nombre:"Juan",
        edad:17
    },
    {
        nombre:"Ana",
        edad:18
    }
];


for(let i = 0; i < alumnos.length; i++){

    console.log(alumnos[i].nombre);
    console.log(alumnos[i].edad);

}


// FOR SUMANDO DE 2 EN 2

for(let i = 0; i <= 20; i += 2){

    console.log(i);

}


// FOR HACIA ATRÁS

for(let i = 10; i >= 1; i--){

    console.log(i);

}


// FOR ANIDADO

for(let i = 1; i <= 3; i++){

    for(let j = 1; j <= 3; j++){

        console.log(i,j);

    }

}

    </script>
</body>
</html>
